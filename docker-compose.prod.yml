services:
  app:
    build: .
    container_name: hayalet-app
    restart: unless-stopped
    ports:
      - "3333:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-hayalet}:${POSTGRES_PASSWORD}@hayalet-postgres:5432/${POSTGRES_DB:-hayalet}
      - REDIS_URL=redis://hayalet-redis:6379
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL:-http://localhost:3333}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: hayalet-worker
    restart: unless-stopped
    command: ["node", "-e", "require('tsx/cjs'); require('./worker.ts')"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-hayalet}:${POSTGRES_PASSWORD}@hayalet-postgres:5432/${POSTGRES_DB:-hayalet}
      - REDIS_URL=redis://hayalet-redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: hayalet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hayalet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hayalet}
    volumes:
      - hayalet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hayalet}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hayalet-redis
    restart: unless-stopped
    volumes:
      - hayalet_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hayalet_pgdata:
  hayalet_redis:
